services:
  - type: web
    name: yanvex-api
    env: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: LOG_LEVEL
        value: info
